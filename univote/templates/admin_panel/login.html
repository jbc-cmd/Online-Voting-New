{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Univote Admin Panel | Login</title>
  
  <!-- Mobile & PWA Customization -->
  <meta name="theme-color" content="#0f172a" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Univote Admin" />
  
  <link rel="icon" type="image/x-icon" href="{% static 'images/favicon.ico' %}" />
  <link rel="shortcut icon" type="image/x-icon" href="{% static 'images/favicon.ico' %}" />
  <link rel="apple-touch-icon" href="{% static 'images/apple-touch-icon.png' %}" />
  <link rel="manifest" href="{% static 'manifest.json' %}" />
  
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="{% static 'css/admin.css' %}" />
</head>
<body class="login-body">
  <div class="login-container">
    <div class="login-card">
      <div class="login-logo text-center mb-3">
        <img src="{% static 'images/logo.png' %}" alt="Univote Logo" style="height: 64px; width: auto; object-fit: contain;" />
      </div>
      <h1 class="login-title">Univote</h1>
      <p class="login-subtitle">Admin Panel — Secure School Voting System</p>

      {% if messages %}
        {% for message in messages %}
          <div class="alert alert-danger alert-sm mb-3" role="alert">
            <i class="bi bi-exclamation-triangle-fill me-2"></i>{{ message }}
          </div>
        {% endfor %}
      {% endif %}

      <form method="post" action="{% url 'accounts:login' %}" autocomplete="off">
        {% csrf_token %}
        <div class="mb-4">
          <label for="username" class="form-label fw-semibold">Username</label>
          <div class="input-group">
            <span class="input-group-text bg-transparent border-end-0">
              <i class="bi bi-person-fill text-muted"></i>
            </span>
            <input type="text" id="username" name="username" class="form-control border-start-0 ps-0"
              placeholder="Enter your username" required autofocus />
          </div>
        </div>
        <div class="mb-4">
          <label for="password" class="form-label fw-semibold">Password</label>
          <div class="input-group">
            <span class="input-group-text bg-transparent border-end-0">
              <i class="bi bi-lock-fill text-muted"></i>
            </span>
            <input type="password" id="password" name="password" class="form-control border-start-0 ps-0"
              placeholder="Enter your password" required />
            <button type="button" class="btn btn-outline-secondary border-start-0" id="togglePassword">
              <i class="bi bi-eye" id="eyeIcon"></i>
            </button>
          </div>
        </div>
        <button type="submit" class="btn btn-primary w-100 btn-login fw-semibold">
          <i class="bi bi-box-arrow-in-right me-2"></i> Sign In to Admin Panel
        </button>
      </form>

      <div class="mt-4 text-center">
        <small class="text-muted">
          <i class="bi bi-shield-lock-fill me-1"></i>
          Protected access — admins only
        </small>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    document.getElementById('togglePassword').addEventListener('click', function() {
      const pwd = document.getElementById('password');
      const icon = document.getElementById('eyeIcon');
      if (pwd.type === 'password') {
        pwd.type = 'text';
        icon.className = 'bi bi-eye-slash';
      } else {
        pwd.type = 'password';
        icon.className = 'bi bi-eye';
      }
    });
  </script>
</body>
</html>
